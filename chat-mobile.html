<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Chat - IQeXponencial</title>
  <link rel="preconnect" href="https://iqexponencial.app" crossorigin>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: #f5f7fb;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .chat-mobile-shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 12px;
      background:
        radial-gradient(120% 80% at 100% 0%, rgba(106,60,198,.12), rgba(106,60,198,0) 65%),
        linear-gradient(180deg, #f8fbff 0%, #eef3ff 100%);
    }
    .chat-mobile-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .chat-mobile-back {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: #ffffff;
      color: #26324a;
      box-shadow: 0 6px 14px rgba(28, 41, 66, .12);
      font-size: 14px;
      cursor: pointer;
    }
    .chat-mobile-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: #24324b;
      flex: 1;
      text-align: center;
      padding-right: 56px;
    }
    .chat-mobile-hint {
      margin: 0 0 10px;
      font-size: 13px;
      color: #5c6b84;
      text-align: center;
    }
    .chat-mobile-loading{
      margin:12px auto 0;
      width:min(360px, calc(100% - 8px));
      background:rgba(18,30,50,.9);
      color:#fff;
      border-radius:14px;
      padding:12px;
      box-shadow:0 10px 24px rgba(8,20,38,.2);
    }
    .chat-mobile-loading p{
      margin:0;
      font-size:13px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .chat-mobile-loading strong{
      font-size:16px;
    }
    .chat-mobile-loading .bar{
      margin-top:8px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.2);
      overflow:hidden;
    }
    .chat-mobile-loading .fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#00d2ff,#7dd3fc);
      transition:width .14s linear;
    }
  </style>
</head>
<body>
  <main class="chat-mobile-shell">
    <div class="chat-mobile-top">
      <button class="chat-mobile-back" type="button" onclick="history.back()">Volver</button>
      <h1 class="chat-mobile-title">Asesor Personal</h1>
    </div>
    <p class="chat-mobile-hint">Si el chat tarda en abrir, espera unos segundos.</p>
    <div id="chatMobileLoading" class="chat-mobile-loading" aria-live="polite">
      <p>Cargando chat <strong id="chatMobileLoadingPct">0%</strong></p>
      <div class="bar"><div id="chatMobileLoadingFill" class="fill"></div></div>
    </div>
  </main>

  <script
    src="https://iqexponencial.app/iqex-chat-widget.js"
    data-base-url="https://iqexponencial.app"
    data-site="miweb-estatica"
    data-title="Asesor Personal"
    data-position="right"
  ></script>
  <script>
    (function openChatWhenReady() {
      const loadingWrap = document.getElementById('chatMobileLoading');
      const loadingPct = document.getElementById('chatMobileLoadingPct');
      const loadingFill = document.getElementById('chatMobileLoadingFill');
      let pct = 0;
      const fromFab = sessionStorage.getItem('iqxChatLoading') === '1';
      if (fromFab) sessionStorage.removeItem('iqxChatLoading');

      function setPct(v) {
        pct = Math.max(0, Math.min(100, v));
        if (loadingPct) loadingPct.textContent = pct + '%';
        if (loadingFill) loadingFill.style.width = pct + '%';
      }

      setPct(fromFab ? 22 : 8);
      const progressTimer = setInterval(() => {
        if (pct >= 94) return;
        setPct(pct + (pct < 40 ? 8 : (pct < 70 ? 5 : 2)));
      }, 170);

      function tryOpen() {
        const api = window.IQEXChatWidget || window.iqexChatWidget || window.IQEXChat;
        if (api && typeof api.open === 'function') {
          api.open();
          return true;
        }
        if (api && typeof api.toggle === 'function') {
          api.toggle();
          return true;
        }
        const launcher = document.querySelector('.iqex-chat-trigger');
        if (launcher) {
          launcher.click();
          return true;
        }
        return false;
      }

      let tries = 0;
      const timer = setInterval(() => {
        tries += 1;
        if (tryOpen()) {
          clearInterval(timer);
          clearInterval(progressTimer);
          setPct(100);
          if (loadingWrap) setTimeout(() => { loadingWrap.style.display = 'none'; }, 220);
          return;
        }
        if (tries > 30) {
          clearInterval(timer);
          clearInterval(progressTimer);
          if (loadingWrap) loadingWrap.style.display = 'none';
        }
      }, 250);
    })();
  </script>
</body>
</html>
