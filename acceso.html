<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acceso | IQeXponencial</title>
  <link href="https://fonts.cdnfonts.com/css/gilroy-bold" rel="stylesheet">
  <style>
    :root{
      --bg-1:#0b1222;
      --bg-2:#1c2c54;
      --accent:#53d6c7;
      --accent-2:#8a66ff;
      --card:#ffffff;
      --text:#172033;
      --muted:#5f6d8b;
      --danger:#e04b5d;
      --ok:#1fa56c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:'Gilroy-Regular',sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 500px at 90% -5%, rgba(138,102,255,.36), transparent 55%),
        radial-gradient(900px 450px at -10% 115%, rgba(83,214,199,.32), transparent 50%),
        linear-gradient(130deg,var(--bg-1),var(--bg-2));
      display:grid;
      place-items:center;
      padding:20px;
    }
    .shell{
      width:min(1080px,100%);
      display:grid;
      grid-template-columns:1.05fr .95fr;
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 26px 70px rgba(5,10,24,.45);
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(10px);
    }
    .info{
      padding:42px 40px;
      color:#eff4ff;
      position:relative;
      isolation:isolate;
      background:linear-gradient(160deg,rgba(10,20,36,.72),rgba(25,44,77,.62));
    }
    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#dff7ff;
      text-decoration:none;
      font-size:14px;
      letter-spacing:.04em;
      text-transform:uppercase;
      opacity:.9;
    }
    .back-link:hover{opacity:1}
    .brand{margin:42px 0 18px;font-size:44px;line-height:.94;font-family:'Gilroy-Bold',sans-serif;letter-spacing:.01em}
    .brand .x{color:var(--accent)}
    .subtitle{margin:0;max-width:42ch;line-height:1.5;color:#d9e6ff}
    .chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:30px}
    .chip{padding:8px 12px;border-radius:999px;font-size:12px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.08)}

    .card{
      background:var(--card);
      padding:36px 30px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#eef2ff;padding:6px;border-radius:14px}
    .tab{
      border:none;
      border-radius:10px;
      padding:10px 12px;
      font-family:'Gilroy-Bold',sans-serif;
      font-size:14px;
      cursor:pointer;
      color:#42506d;
      background:transparent;
    }
    .tab.active{background:#fff;color:#1d2850;box-shadow:0 6px 16px rgba(24,36,66,.14)}
    .forms{position:relative;min-height:356px}
    form{display:none;gap:12px;flex-direction:column;animation:fade .24s ease}
    form.active{display:flex}
    @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    label{font-size:13px;color:#4f5c79;font-family:'Gilroy-Bold',sans-serif}
    input,select{
      width:100%;
      border:1px solid #d3dcf0;
      background:#f7f9ff;
      border-radius:12px;
      padding:12px 13px;
      font-size:15px;
      color:#1b2642;
      outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    input:focus,select:focus{border-color:#8a66ff;box-shadow:0 0 0 3px rgba(138,102,255,.2)}
    .btn{
      margin-top:8px;
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-family:'Gilroy-Bold',sans-serif;
      font-size:15px;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(120deg,#6c3be9,#4f6dff,#35c0be);
      background-size:170% 170%;
      animation:flow 4s linear infinite;
    }
    @keyframes flow{0%{background-position:0 50%}100%{background-position:100% 50%}}
    .message{min-height:22px;font-size:13px;font-family:'Gilroy-Bold',sans-serif}
    .message.error{color:var(--danger)}
    .message.ok{color:var(--ok)}
    .hint{margin:0;font-size:12px;color:var(--muted);line-height:1.45}

    @media (max-width:920px){
      .shell{grid-template-columns:1fr}
      .info{padding:28px 24px}
      .brand{margin-top:24px;font-size:34px}
      .card{padding:26px 20px}
      .forms{min-height:0}
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="info">
      <a class="back-link" href="index.html">VOLVER AL INICIO</a>
      <h1 class="brand">Panel de <span class="x">Acceso</span></h1>
      <p class="subtitle">Base inicial estilo LMS para administradores, profesores y alumnos. Empieza creando tu cuenta o iniciando sesion.</p>
      <div class="chips">
        <span class="chip">Roles</span>
        <span class="chip">Cursos</span>
        <span class="chip">Progreso</span>
        <span class="chip">Evaluaciones</span>
      </div>
    </section>

    <section class="card">
      <div class="tabs" role="tablist" aria-label="Acceso">
        <button class="tab active" type="button" id="tabLogin">Iniciar Sesion</button>
        <button class="tab" type="button" id="tabRegister">Registrarme</button>
      </div>

      <div class="message" id="authMessage" aria-live="polite"></div>

      <div class="forms">
        <form id="loginForm" class="active" autocomplete="on">
          <div>
            <label for="loginEmail">Correo</label>
            <input id="loginEmail" name="email" type="email" required />
          </div>
          <div>
            <label for="loginPassword">Contrasena</label>
            <input id="loginPassword" name="password" type="password" minlength="8" required />
          </div>
          <button class="btn" type="submit">Entrar al Panel</button>
          <p class="hint">Si no tienes cuenta, usa la pestana <strong>Registrarme</strong>.</p>
        </form>

        <form id="registerForm" autocomplete="on">
          <div>
            <label for="registerName">Nombre completo</label>
            <input id="registerName" name="fullName" type="text" minlength="3" required />
          </div>
          <div>
            <label for="registerEmail">Correo</label>
            <input id="registerEmail" name="email" type="email" required />
          </div>
          <div>
            <label for="registerRole">Rol</label>
            <select id="registerRole" name="role">
              <option value="student">Alumno</option>
              <option value="teacher">Profesor</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <div>
            <label for="registerPassword">Contrasena</label>
            <input id="registerPassword" name="password" type="password" minlength="8" required />
          </div>
          <button class="btn" type="submit">Crear Cuenta</button>
          <p class="hint">Recomendado: Contrasena de al menos 10 caracteres.</p>
        </form>
      </div>
    </section>
  </div>

  <script>
    (function initAccessPanel(){
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const message = document.getElementById('authMessage');

      function setMessage(text, type){
        message.textContent = text || '';
        message.className = 'message' + (type ? (' ' + type) : '');
      }

      function setMode(mode){
        const loginMode = mode === 'login';
        tabLogin.classList.toggle('active', loginMode);
        tabRegister.classList.toggle('active', !loginMode);
        loginForm.classList.toggle('active', loginMode);
        registerForm.classList.toggle('active', !loginMode);
        setMessage('');
      }

      async function requestJson(url, payload){
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          const error = new Error(data.message || 'Request failed');
          error.status = response.status;
          throw error;
        }
        return data;
      }

      tabLogin.addEventListener('click', function(){ setMode('login'); });
      tabRegister.addEventListener('click', function(){ setMode('register'); });

      registerForm.addEventListener('submit', async function(e){
        e.preventDefault();
        setMessage('Creando cuenta...', '');

        const formData = new FormData(registerForm);
        const payload = {
          fullName: String(formData.get('fullName') || '').trim(),
          email: String(formData.get('email') || '').trim(),
          role: String(formData.get('role') || 'student').trim(),
          password: String(formData.get('password') || ''),
        };

        try {
          await requestJson('/api/auth/register', payload);
          setMessage('Cuenta creada. Ahora puedes iniciar sesion.', 'ok');
          registerForm.reset();
          setMode('login');
        } catch (error) {
          setMessage(error.message || 'No se pudo registrar la cuenta', 'error');
        }
      });

      loginForm.addEventListener('submit', async function(e){
        e.preventDefault();
        setMessage('Validando acceso...', '');

        const formData = new FormData(loginForm);
        const payload = {
          email: String(formData.get('email') || '').trim(),
          password: String(formData.get('password') || ''),
        };

        try {
          const result = await requestJson('/api/auth/login', payload);
          localStorage.setItem('iqx_auth_user', JSON.stringify(result.user));
          setMessage('Acceso correcto. Redirigiendo al panel...', 'ok');
          setTimeout(function(){ window.location.href = '/dashboard/'; }, 500);
        } catch (error) {
          setMessage(error.message || 'No se pudo iniciar sesion', 'error');
        }
      });
    })();
  </script>
</body>
</html>
