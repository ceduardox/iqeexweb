  <script>
    (function initTopNavMenu(){
      const h=document.getElementById('iqxTopnav'),b=document.getElementById('iqxBurger'),o=document.getElementById('iqxMenuOverlay'),bd=document.getElementById('iqxMenuBackdrop'),l=document.getElementById('iqxLang'),lb=document.getElementById('iqxLangBtn'),lm=document.getElementById('iqxLangMenu'),lbtn=lm?Array.from(lm.querySelectorAll('button')):[],links=o?Array.from(o.querySelectorAll('a')):[],cb=document.getElementById('iqxHeaderContact');
      if(!h||!b||!o||!bd)return;
      const frame=document.getElementById('pageFrame');
      const close=()=>{o.classList.remove('active');bd.classList.remove('active');h.classList.remove('menu-open');document.body.style.overflow='';};
      const open=()=>{o.classList.add('active');bd.classList.add('active');h.classList.add('menu-open');if(window.innerWidth<=980)document.body.style.overflow='hidden';};
      const updateMobileLogo=()=>{
        if(window.innerWidth>980){h.classList.add('mobile-scrolled');return;}
        const y=window.pageYOffset||document.documentElement.scrollTop||0;
        h.classList.toggle('mobile-scrolled',y>20);
      };
      b.addEventListener('click',()=>o.classList.contains('active')?close():open());
      bd.addEventListener('click',close);
      links.forEach((a)=>a.addEventListener('click',(e)=>{e.preventDefault();const href=a.getAttribute('href');if(!href)return;links.forEach((x)=>x.classList.remove('is-typing'));a.classList.add('is-typing');setTimeout(()=>window.location.href=href,1400);}));
      if(l&&lb&&lm){
        lb.addEventListener('click',(e)=>{e.stopPropagation();const ex=l.classList.toggle('open');lb.setAttribute('aria-expanded',String(ex));});
        lbtn.forEach((x)=>x.addEventListener('click',()=>{const c=(x.getAttribute('data-code')||'EN').toLowerCase();if(window.IQXI18N&&typeof window.IQXI18N.setLanguage==='function')window.IQXI18N.setLanguage(c);l.classList.remove('open');lb.setAttribute('aria-expanded','false');}));
        document.addEventListener('click',(e)=>{if(!l.contains(e.target)){l.classList.remove('open');lb.setAttribute('aria-expanded','false');}});
      }
      if(cb)cb.addEventListener('click',()=>window.location.href='contacto.html');

      window.addEventListener('scroll',updateMobileLogo,{passive:true});
      window.addEventListener('resize',updateMobileLogo,{passive:true});
      window.addEventListener('wheel',(e)=>{if(window.innerWidth<=980&&e.deltaY>0)h.classList.add('mobile-scrolled');},{passive:true});
      let touchStartY=0;
      window.addEventListener('touchstart',(e)=>{touchStartY=e.touches&&e.touches[0]?e.touches[0].clientY:0;},{passive:true});
      window.addEventListener('touchmove',(e)=>{
        if(window.innerWidth>980)return;
        const currentY=e.touches&&e.touches[0]?e.touches[0].clientY:touchStartY;
        if(currentY<touchStartY-6)h.classList.add('mobile-scrolled');
        if(currentY>touchStartY+6&&((window.pageYOffset||document.documentElement.scrollTop||0)<=5))h.classList.remove('mobile-scrolled');
      },{passive:true});

      // Fallback: en esta pagina el scroll principal ocurre dentro del iframe.
      if(frame){
        ['pointerdown','mousedown','touchstart','wheel'].forEach((evt)=>{
          frame.addEventListener(evt,()=>{if(window.innerWidth<=980)h.classList.add('mobile-scrolled');},{passive:true});
        });
      }
      updateMobileLogo();
    })();
  </script>
  <script>
    (function initPagePreloader() {
      window.__iqxPreloaderDone = false;
      const preloader = document.getElementById('iqxPreloader');
      const wordEl = document.getElementById('iqxPreloaderWord');
      const percentEl = document.getElementById('iqxPreloaderPercent');
      if (!preloader || !wordEl || !percentEl) {
        window.__iqxPreloaderDone = true;
        window.dispatchEvent(new Event('iqx:preloader-done'));
        return;
      }

      const word = 'eXponencial';
      wordEl.innerHTML = '';
      word.split('').forEach((char, index) => {
        const span = document.createElement('span');
        span.className = 'letter';
        span.textContent = char;
        if (char.toLowerCase() === 'x') span.classList.add('x');
        if (char.toLowerCase() === 'o') span.classList.add('o');
        wordEl.appendChild(span);
        setTimeout(() => {
          span.style.opacity = '1';
          span.style.transform = 'translateY(0)';
        }, 120 + (index * 90));
      });

      let progress = 0;
      let target = 12;
      let loaded = false;
      const startAt = performance.now();

      function estimateTarget() {
        const elapsed = (performance.now() - startAt) / 1000;
        const timeRatio = Math.min(elapsed / 4, 1);
        target = Math.max(target, Math.floor(timeRatio * 100));
        if (!loaded) target = Math.min(target, 96);
      }

      function hidePreloader() {
        preloader.classList.add('is-hidden');
        document.body.classList.remove('preloader-active');
        window.__iqxPreloaderDone = true;
        window.dispatchEvent(new Event('iqx:preloader-done'));
        setTimeout(() => {
          if (preloader && preloader.parentNode) preloader.parentNode.removeChild(preloader);
        }, 550);
      }

      function tick() {
        estimateTarget();
        progress += (target - progress) * 0.12;
        if (target - progress < 0.35) progress = target;
        const shown = Math.max(0, Math.min(100, Math.round(progress)));
        percentEl.textContent = shown + '%';

        if (loaded && shown >= 100) {
          hidePreloader();
          return;
        }
        requestAnimationFrame(tick);
      }

      window.addEventListener('load', () => {
        loaded = true;
        target = 100;
      }, { once: true });

      requestAnimationFrame(tick);
    })();
  </script>

age.setItem('iqx_lang',l);const u=new URL(window.location.href);u.searchParams.set('lang',l);window.location.href=u.pathname+u.search;}};})();
  </script>
  <script>(function initVisibilityPowerSaver(){const PAUSE_AFTER_MS=10000,PAUSED_CLASS="app-paused";let hideTimer=null,paused=false;function setPaused(next){if(paused===next)return;paused=next;document.documentElement.classList.toggle(PAUSED_CLASS,paused);if(document.body)document.body.classList.toggle(PAUSED_CLASS,paused);if(window.gsap&&window.gsap.globalTimeline){if(paused)window.gsap.globalTimeline.pause();else window.gsap.globalTimeline.resume();}document.querySelectorAll("video, audio").forEach((m)=>{if(paused){if(!m.paused){m.dataset.wasPlaying="1";m.pause();}}else if(m.dataset.wasPlaying==="1"){m.play().catch(()=>{});delete m.dataset.wasPlaying;}});window.dispatchEvent(new CustomEvent(paused?"app:pause":"app:resume"));}function schedulePause(){clearTimeout(hideTimer);hideTimer=setTimeout(()=>setPaused(true),PAUSE_AFTER_MS);}function resumeNow(){clearTimeout(hideTimer);setPaused(false);}function onVisibilityChange(){if(document.hidden)schedulePause();else resumeNow();}document.addEventListener("visibilitychange",onVisibilityChange,{passive:true});window.addEventListener("pagehide",schedulePause,{passive:true});window.addEventListener("pageshow",resumeNow,{passive:true});window.addEventListener("blur",()=>{if(!document.hidden)schedulePause();},{passive:true});window.addEventListener("focus",resumeNow,{passive:true});onVisibilityChange();})();</script>
