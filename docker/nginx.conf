server {
    listen 80;
    server_name localhost;
    absolute_redirect off;
    port_in_redirect off;
    client_max_body_size 500M;
    root /app/static;
    index index.html;

    # Increase header buffer size
    large_client_header_buffers 4 32k;

    # Increase the maximum allowed size of the client request body
    client_body_buffer_size 32k;

    # Increase the maximum allowed size of the client request header fields
    client_header_buffer_size 32k;

    # Internal access gate used to protect the public static website.
    # The admin/LMS routes are intentionally not behind this check so the
    # superadmin can add or fix allowed IPs from /lms/admin/security.
    location = /__site_access_check {
        internal;
        proxy_pass http://localhost:9000/api/v1/instance/access-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Learnhouse-Client-IP $http_cf_connecting_ip;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Collab server (WebSocket)
    location ^~ /collab {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Legacy compatibility: old LMS path now points to LearnHouse login
    location = /dashboard {
        return 302 /lms/login;
    }
    location = /dashboard/ {
        return 302 /lms/login;
    }

    # Dedicated LMS entrypoint under /lms to avoid collisions with the static website
    location = /lms {
        return 302 /lms/login;
    }
    location ^~ /lms/ {
        rewrite ^/lms/(.*)$ /$1 break;
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # NextJS Revalidation
    location ^~ /api/revalidate {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next Auth
    location ^~ /api/auth {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Python Backend API
    location ^~ /api/v1 {
        proxy_pass http://localhost:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend Static Content
    location ^~ /content {
        proxy_pass http://localhost:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static chunks
    location ^~ /_next/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Runtime config generated by LearnHouse server-wrapper
    location = /runtime-config.js {
        proxy_pass http://localhost:8000/runtime-config.js;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Other LearnHouse Next.js API routes (/api/sitemap, /api/robots, etc.)
    location ^~ /api/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backward compatibility: old root LMS routes now redirect to /lms/*
    location ~ ^/(login|signup|forgot|reset|verify-email|auth|orgs|home|admin|board|boards|editor|payments|embed|redirect_from_auth|dash|account|course|courses|collection|collections|community|communities|podcast|podcasts|playground|playgrounds|search|store|trail|user|certificates|copilot)(/|$) {
        return 302 /lms$request_uri;
    }

    # Main IQeXponencial website
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /__site_private_forbidden {
        internal;
        add_header X-Robots-Tag "noindex, nofollow" always;
        return 403 "";
    }
}
